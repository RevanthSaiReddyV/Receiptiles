# Fine-tuning configuration for Receipt Parser models
# Two models: Qwen2.5-VL for images, Phi-3.5-mini for text

# ═══════════════════════════════════════════════════════════
# MODEL A: Text Parser (emails, OCR output → structured JSON)
# Phi-3.5-mini — 3.8B params, 4x faster to train than Llama 8B
# ═══════════════════════════════════════════════════════════
text_model:
  base_model: "microsoft/Phi-3.5-mini-instruct"
  output_dir: "../outputs/receipt-text-parser-v1"

  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

  lora:
    r: 16
    lora_alpha: 32
    target_modules:
      - "qkv_proj"
      - "o_proj"
      - "gate_up_proj"
      - "down_proj"
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

  training:
    num_train_epochs: 3
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 2
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.03
    lr_scheduler_type: "cosine"
    max_seq_length: 2048
    bf16: true
    logging_steps: 10
    save_steps: 100
    eval_steps: 50
    save_total_limit: 3
    gradient_checkpointing: true
    optim: "paged_adamw_32bit"

  data:
    train_file: "../data/text_train.jsonl"
    eval_file: "../data/text_eval.jsonl"

# ═══════════════════════════════════════════════════════════
# MODEL B: Vision Parser (receipt photos → structured JSON)
# Qwen2.5-VL-7B — beats GPT-4o-mini on OCR (864 vs 785)
# ═══════════════════════════════════════════════════════════
vision_model:
  base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  output_dir: "../outputs/receipt-vision-parser-v1"

  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

  lora:
    r: 16
    lora_alpha: 32
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

  training:
    num_train_epochs: 2
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    learning_rate: 1.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.05
    lr_scheduler_type: "cosine"
    max_seq_length: 4096
    bf16: true
    logging_steps: 10
    save_steps: 50
    eval_steps: 25
    save_total_limit: 2
    gradient_checkpointing: true
    optim: "paged_adamw_32bit"

  data:
    train_file: "../data/vision_train.jsonl"
    eval_file: "../data/vision_eval.jsonl"

